apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lineup-api
  annotations:
    # Public API without an allUsers IAM binding: the org enforces domain-
    # restricted sharing (iam.allowedPolicyMemberDomains), which rejects
    # allUsers run.invoker grants. Disabling the invoker IAM check is the
    # org-policy-compliant way to allow unauthenticated invocations
    # (run.managed.requireInvokerIam is not enforced). App-level auth is
    # Firebase ID tokens (task 8).
    run.googleapis.com/invoker-iam-disabled: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/network-interfaces: '[{"network":"default","subnetwork":"default"}]'
        run.googleapis.com/vpc-access-egress: "private-ranges-only"
    spec:
      serviceAccountName: api-runtime@lineup-app-ae6b.iam.gserviceaccount.com
      containers:
        - image: api-image
          ports:
            - containerPort: 8080
          env:
            - name: FIREBASE_PROJECT_ID
              value: "lineup-app-ae6b"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: "latest"
            - name: TMDB_READ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tmdb-read-token
                  key: "latest"
  traffic:
    - percent: 100
      latestRevision: true
